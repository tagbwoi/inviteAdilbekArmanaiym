<script>
  // ===== Параметрлер =====
  const SPEED_PX_PER_SEC = 33;      // жылдамдық (px/сек)
  const RESTART_DELAY_MS = 3000;    // пайдаланушы әрекетінен кейін қайта қосу кідірісі

  // ===== Элементтер =====
  const modal = document.getElementById("musicModal");
  const playButton = document.getElementById("playMusic");
  const audio = document.getElementById("backgroundMusic");

  document.documentElement.style.scrollBehavior = 'auto';
  document.body.style.scrollBehavior = 'auto';
  document.body.style.overflow = 'hidden'; // модал ашық кезде скролды бұғаттау

  // ===== Күй =====
  let isRunning = false;    
  let resumeTimer = null;   
  let rafId = null;         
  let lastTs = 0;           
  let accum = 0;            

  // Қауіпсіз скрол функциясы
  function safeScrollBy(step) {
    const before = window.pageYOffset ||
      document.documentElement.scrollTop ||
      document.body.scrollTop || 0;

    window.scrollBy(0, step);

    let after = window.pageYOffset ||
      document.documentElement.scrollTop ||
      document.body.scrollTop || 0;

    if (after === before) {
      document.documentElement.scrollTop = before + step;
      after = window.pageYOffset ||
        document.documentElement.scrollTop ||
        document.body.scrollTop || 0;

      if (after === before) {
        document.body.scrollTop = before + step;
      }
    }
  }

  function atBottom() {
    const maxScroll =
      Math.max(document.documentElement.scrollHeight, document.body.scrollHeight) - window.innerHeight;
    const y = window.pageYOffset ||
      document.documentElement.scrollTop ||
      document.body.scrollTop || 0;
    return y >= maxScroll - 1;
  }

  // Негізгі цикл
  function loop(ts) {
    rafId = requestAnimationFrame(loop);
    if (!isRunning) { lastTs = ts; return; }
    if (!lastTs) lastTs = ts;

    const dt = ts - lastTs;
    lastTs = ts;

    accum += (SPEED_PX_PER_SEC * dt) / 1000;

    const step = Math.floor(accum);
    if (step >= 1) {
      accum -= step;

      if (atBottom()) {
        // === Соңына жеткенде тоқтату ===
        stopAuto();
        cancelAnimationFrame(rafId);
        rafId = null;
        return;
      }

      safeScrollBy(step);
    }
  }

  // Авто-скролды басқару
  function startAuto() { if (!isRunning) { isRunning = true; } }
  function stopAuto()  { isRunning = false; }

  function restartAfterDelay() {
    clearTimeout(resumeTimer);
    resumeTimer = setTimeout(() => startAuto(), RESTART_DELAY_MS);
  }

  // Пайдаланушы әрекеттерін тыңдау
  const onInteract = () => { stopAuto(); restartAfterDelay(); };
  window.addEventListener('touchstart', onInteract, { passive: true });
  window.addEventListener('touchmove',  onInteract, { passive: true });
  window.addEventListener('wheel',      onInteract, { passive: true });
  window.addEventListener('mousedown',  onInteract, { passive: true });
  window.addEventListener('keydown',    onInteract, { passive: true });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { stopAuto(); }
    else { restartAfterDelay(); }
  });

  // Модалды жабу
  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }

  playButton.addEventListener('click', () => {
    audio.play().catch(()=>{});
    closeModal();
    if (!rafId) rafId = requestAnimationFrame(loop);
    restartAfterDelay();
  });
</script>

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
            observer.unobserve(entry.target);
          }
        });
      });

      var elements = document.querySelectorAll(".fade-in");
      elements.forEach(function(element) {
        observer.observe(element);
      });
    });

<script>
    

  const URL_APP = "https://script.google.com/macros/s/AKfycbwZp_d4aLR9FIHWVo9wq-2ZxifOAXe-rrc0p04x1JgQUze9E5qMHoIe5BvPK-mvAeWx/exec";

const form = document.querySelector("#form");
form.action = URL_APP;

form.addEventListener("submit", async (ev) => {
  ev.preventDefault();

  // 1. Собираем данные ИМЕННО в момент нажатия кнопки «Отправить»
  const attendance = document.querySelector('input[name="name"]:checked');
  // Ищем выбранную плитку по имени "count"
  const countElement = document.querySelector('input[name="count"]:checked'); 
  const message = document.querySelector('textarea[name="message"]');

  // 2. Формируем объект. 
  // ВАЖНО: поле 'choice' — это ваша третья колонка в таблице.
  // Мы берем значение из 'countElement' и кладем его в 'choice'.
  let details = {
    name: attendance ? attendance.value : '',
    choice: countElement ? countElement.value : '', 
    message: message.value.trim(),
  };

  let formBody = [];
  for (let property in details) {
    let encodedKey = encodeURIComponent(property);
    let encodedValue = encodeURIComponent(details[property]);
    formBody.push(encodedKey + "=" + encodedValue);
  }
  formBody = formBody.join("&");

  // Очистка формы после нажатия
  if (attendance) attendance.checked = false;
  if (countElement) countElement.checked = false;
  message.value = '';

  alert('Жауабыңызға рахмет!');

  fetch(URL_APP, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
    },
    mode: "no-cors",
    body: formBody,
  }).catch((err) => {
    console.error('Error:', err);
    alert("Ошибка отправки!");
  });
});
