<script>
  const SPEED_PX_PER_SEC = 33;      
  const RESTART_DELAY_MS = 3000;    

  const modal = document.getElementById("musicModal");
  const playButton = document.getElementById("playMusic");
  const audio = document.getElementById("backgroundMusic");

  document.documentElement.style.scrollBehavior = 'auto';
  document.body.style.scrollBehavior = 'auto';
  document.body.style.overflow = 'hidden'; 

  let isRunning = false;    
  let resumeTimer = null;   
  let rafId = null;         
  let lastTs = 0;           
  let accum = 0;            

  function safeScrollBy(step) {
    const before = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    window.scrollBy(0, step);
    let after = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    if (after === before) {
      document.documentElement.scrollTop = before + step;
      after = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
      if (after === before) { document.body.scrollTop = before + step; }
    }
  }

  function atBottom() {
    const maxScroll = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight) - window.innerHeight;
    const y = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    return y >= maxScroll - 1;
  }

  function loop(ts) {
    rafId = requestAnimationFrame(loop);
    if (!isRunning) { lastTs = ts; return; }
    if (!lastTs) lastTs = ts;
    const dt = ts - lastTs;
    lastTs = ts;
    accum += (SPEED_PX_PER_SEC * dt) / 1000;
    const step = Math.floor(accum);
    if (step >= 1) {
      accum -= step;
      if (atBottom()) {
        stopAuto();
        cancelAnimationFrame(rafId);
        rafId = null;
        return;
      }
      safeScrollBy(step);
    }
  }

  function startAuto() { if (!isRunning) { isRunning = true; } }
  function stopAuto()  { isRunning = false; }

  function restartAfterDelay() {
    clearTimeout(resumeTimer);
    resumeTimer = setTimeout(() => startAuto(), RESTART_DELAY_MS);
  }

  const onInteract = () => { stopAuto(); restartAfterDelay(); };
  window.addEventListener('touchstart', onInteract, { passive: true });
  window.addEventListener('touchmove',  onInteract, { passive: true });
  window.addEventListener('wheel',      onInteract, { passive: true });
  window.addEventListener('mousedown',  onInteract, { passive: true });
  window.addEventListener('keydown',    onInteract, { passive: true });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { stopAuto(); }
    else { restartAfterDelay(); }
  });

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }

  playButton.addEventListener('click', () => {
    audio.play().catch(()=>{});
    closeModal();
    if (!rafId) rafId = requestAnimationFrame(loop);
    restartAfterDelay();
  });
</script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
            observer.unobserve(entry.target);
          }
        });
      });
      var elements = document.querySelectorAll(".fade-in");
      elements.forEach(function(element) {
        observer.observe(element);
      });
    });
</script>

<script>
const URL_APP = "https://script.google.com/macros/s/AKfycbwZp_d4aLR9FIHWVo9wq-2ZxifOAXe-rrc0p04x1JgQUze9E5qMHoIe5BvPK-mvAeWx/exec";
const form = document.querySelector("#form");
form.action = URL_APP;

form.addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const attendance = document.querySelector('input[name="name"]:checked');
  const countElement = document.querySelector('input[name="count"]:checked'); 
  const message = document.querySelector('textarea[name="message"]');

  let details = {
    name: attendance ? attendance.value : '',
    choice: countElement ? countElement.value : '', 
    message: message.value.trim(),
  };

  let formBody = [];
  for (let property in details) {
    let encodedKey = encodeURIComponent(property);
    let encodedValue = encodeURIComponent(details[property]);
    formBody.push(encodedKey + "=" + encodedValue);
  }
  formBody = formBody.join("&");

  if (attendance) attendance.checked = false;
  if (countElement) countElement.checked = false;
  message.value = '';

  alert('Жауабыңызға рахмет!');

  fetch(URL_APP, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
    mode: "no-cors",
    body: formBody,
  }).catch((err) => {
    console.error('Error:', err);
    alert("Ошибка отправки!");
  });
});

function onEntry(entry) { 
  entry.forEach(change => { 
    if (change.isIntersecting) { change.target.classList.add('element-show'); } 
  }); 
} 
let options = { threshold: [0.5] }; 
let observer = new IntersectionObserver(onEntry, options); 
let elements = document.querySelectorAll('.element-animation'); 
for (let elm of elements) { observer.observe(elm); }
</script>

<script async>
document.addEventListener('DOMContentLoaded', function() {
    function updateCountdown() {
        const endDate = new Date("August 28, 2026 18:00:00").getTime();
        const now = new Date().getTime();
        const distance = endDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;

        if (distance < 0) {
            clearInterval(timerInterval);
            document.getElementById("days").innerText = "00";
            document.getElementById("hours").innerText = "00";
            document.getElementById("minutes").innerText = "00";
            document.getElementById("seconds").innerText = "00";
        }
    }
    const timerInterval = setInterval(updateCountdown, 1000);
    updateCountdown();
});
</script>
